<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bing Video Background Search</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      font-family: "Segoe UI", sans-serif;
    }
    video#bgVideo {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: -1;
    }
    .content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      background: transparent;
      padding: 20px;
    }
    .bing-logo {
      display: block;
      width: 64px;
      height: auto;
      margin: 0 auto 20px auto;
      filter: drop-shadow(0 0 4px rgba(0, 0, 0, 0.4));
    }
    form {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }
    form input[type="text"] {
      padding: 12px 20px;
      width: 320px;
      font-size: 16px;
      border: 2px solid white;
      border-radius: 30px;
      background: transparent;
      color: white;
      outline: none;
      transition: all 0.3s ease;
    }
    form input[type="text"]::placeholder {
      color: rgba(255, 255, 255, 0.7);
    }
    form input[type="text"]:focus {
      box-shadow: 0 0 12px rgba(255, 255, 255, 0.4);
    }
    form button {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background-color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }
    form button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    form button:hover:enabled {
      background-color: #ddd;
    }
    form button svg {
      width: 20px;
      height: 20px;
      fill: none;
    }
    .wallpaper-change-wrapper {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
    }
    .wallpaper-btn {
      display: inline-block;
      padding: 12px 24px;
      font-size: 16px;
      border: 2px solid white;
      border-radius: 30px;
      background: transparent;
      color: white;
      cursor: pointer;
      opacity: 0; /* 默认透明 */
      transition: opacity 0.3s ease;
      pointer-events: auto; /* 保持可点击 */
    }
    .wallpaper-change-wrapper:hover .wallpaper-btn {
      opacity: 1; /* 悬停时显示 */
    }
    #videoUpload {
      display: none;
    }
  </style>
</head>
<body>
  <video id="bgVideo" autoplay muted loop>
    <source src="Arona[EDIT_4K_MP4].mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>
  <div class="content">
    <img
      src="bing-logo.png"
      alt="Bing Logo"
      class="bing-logo"
    >
    <form action="https://www.bing.com/search" method="GET" target="_blank">
      <input type="text" name="q" id="searchInput" placeholder="Search Bing..." required>
      <button type="submit" aria-label="Search" id="searchBtn" disabled>
        <svg viewBox="0 0 24 24">
          <path d="M10 6l6 6-6 6" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </form>
  </div>
  <div class="wallpaper-change-wrapper">
    <label for="videoUpload" class="wallpaper-btn">更改壁纸</label>
    <input type="file" id="videoUpload" accept="video/mp4">
  </div>
  <script>
    // 更改背景视频
    document.getElementById("videoUpload").addEventListener("change", function(event) {
      const file = event.target.files[0];
      if (file && file.type === "video/mp4") {
        const videoURL = URL.createObjectURL(file);
        const bgVideo = document.getElementById("bgVideo");
        bgVideo.src = videoURL;
        bgVideo.load();
        bgVideo.play();
      } else {
        alert("请上传有效的 MP4 视频文件。");
      }
    });
    // 输入控制按钮状态
    const input = document.getElementById('searchInput');
    const button = document.getElementById('searchBtn');
    input.addEventListener('input', () => {
      button.disabled = input.value.trim() === '';
    });
  </script>
</body>
</html>
